name: Build PDF

on:
  schedule:
    - cron: "0 0 1 1,3,5,7,9,11 *" 
  workflow_dispatch: # manual trigger

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker://dvnh87/pandoc-with-make-and-tla-fonts:1.0
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF artifact
          path: build/modeling-with-tla-for-engineers.pdf
          retention-days: 1
